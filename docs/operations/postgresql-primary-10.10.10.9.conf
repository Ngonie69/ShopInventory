# ShopInventory PostgreSQL primary template
# Host: 10.10.10.9
# Purpose: primary read-write node for ShopInventory API/Web
#
# Notes:
# - This is a full working template intended as a starting point, not a verbatim
#   copy of PostgreSQL's stock sample file.
# - Replace archive paths and passwords before use.
# - Keep PostgreSQL major version aligned with the standby on 10.10.10.58.
# - This file does not replace pg_hba.conf. You still need replication and app
#   access rules there.


#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3
password_encryption = scram-sha-256
tcp_keepalives_idle = 60
tcp_keepalives_interval = 30
tcp_keepalives_count = 10


#------------------------------------------------------------------------------
# RESOURCE USAGE
#------------------------------------------------------------------------------

# Conservative values suitable for a modest production host.
# Increase these if the database server has materially more RAM.
shared_buffers = 512MB
temp_buffers = 16MB
work_mem = 8MB
maintenance_work_mem = 256MB
dynamic_shared_memory_type = windows
effective_cache_size = 2GB

max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
max_parallel_workers = 8


#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------

wal_level = replica
fsync = on
synchronous_commit = on
full_page_writes = on
wal_compression = on

wal_buffers = 16MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

archive_mode = on
# Replace this share with a real archive destination that the PostgreSQL
# service account on 10.10.10.9 can write to.
archive_command = 'copy "%p" "\\10.10.10.58\pg_archive\%f"'
archive_timeout = 60s


#------------------------------------------------------------------------------
# REPLICATION
#------------------------------------------------------------------------------

max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 4096MB
wal_sender_timeout = 60s
hot_standby = on

# Start with asynchronous replication for the first production rollout.
# If you later want synchronous protection and the LAN latency is stable,
# uncomment the line below after the standby is proven healthy.
# synchronous_standby_names = 'FIRST 1 (shopinventory_standby)'


#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

default_statistics_target = 100
random_page_cost = 1.5
effective_io_concurrency = 4
maintenance_io_concurrency = 4


#------------------------------------------------------------------------------
# REPORTING AND LOGGING
#------------------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0640
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = 'setup_durations'
log_disconnections = on
log_lock_waits = on
log_temp_files = 50MB
log_autovacuum_min_duration = 10s
log_line_prefix = '%m [%p] %q%u@%d app=%a host=%h '
log_timezone = 'Africa/Johannesburg'


#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------

track_activities = on
track_counts = on
track_io_timing = on
track_wal_io_timing = on
compute_query_id = auto


#------------------------------------------------------------------------------
# VACUUMING
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2ms
vacuum_cost_limit = 200


#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

datestyle = 'iso, dmy'
timezone = 'Africa/Johannesburg'
lc_messages = 'English_Zimbabwe.1252'
lc_monetary = 'English_Zimbabwe.1252'
lc_numeric = 'English_Zimbabwe.1252'
lc_time = 'English_Zimbabwe.1252'
default_text_search_config = 'pg_catalog.english'


#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s


#------------------------------------------------------------------------------
# CLUSTER IDENTITY
#------------------------------------------------------------------------------

cluster_name = 'shopinventory-primary'