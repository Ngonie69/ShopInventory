# ShopInventory pg_hba.conf primary template
# Host: 10.10.10.9
# Purpose: client authentication for the active primary while 10.10.10.58
#          streams from it as the standby
#
# Notes:
# - This is a Windows-focused template. PostgreSQL on Windows uses TCP/IP for
#   local administration, so this file uses host rules rather than Unix-socket
#   local rules.
# - Keep the rules narrow. Prefer /32 host entries over /24 unless you have a
#   clear operational reason to widen access.
# - Reload PostgreSQL after changes with SELECT pg_reload_conf(); or pg_ctl
#   reload.


# TYPE  DATABASE                        USER            ADDRESS         METHOD

# Loopback administration and local service access on the primary host
host    all                             all             127.0.0.1/32   scram-sha-256
host    all                             all             ::1/128        scram-sha-256

# Streaming replication from the standby on 10.10.10.58
host    replication                     repl_user       10.10.10.58/32 scram-sha-256

# Optional loopback replication testing on the primary host itself
host    replication                     repl_user       127.0.0.1/32   scram-sha-256
host    replication                     repl_user       ::1/128        scram-sha-256

# ShopInventory application access from the current primary host
host    shopinventory,shopinventoryweb  shopinventory   10.10.10.9/32  scram-sha-256

# ShopInventory application access from the standby host after failover,
# promotion testing, or local recovery drills
host    shopinventory,shopinventoryweb  shopinventory   10.10.10.58/32 scram-sha-256

# Administrative access from the two database hosts
host    all                             postgres        10.10.10.9/32  scram-sha-256
host    all                             postgres        10.10.10.58/32 scram-sha-256

# Optional remote pgAdmin workstation access. Replace the IP with the exact
# operator workstation address if pgAdmin runs off-box. Do not widen this to
# /24 unless you deliberately accept that exposure.
# host  all                             postgres        10.10.10.25/32 scram-sha-256

# Optional future application subnet rule if ShopInventory is moved to a
# separate app host or load balancer. Prefer single-host rules first.
# host  shopinventory,shopinventoryweb  shopinventory   10.10.10.0/24  scram-sha-256